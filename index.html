<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kupi Avia</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a3a5a;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        h1 {
            text-align: center;
            color: #ffb347;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 15px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #ffb347;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-sizing: border-box;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .autocomplete-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #2c4e72;
            border-radius: 10px;
            z-index: 1000;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: none;
        }
        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .autocomplete-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(to right, #ffb347, #ffcc33);
            color: black;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }
        .footer-text {
            text-align: center;
            font-size: 10px;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.5);
        }
        /* Стили для карточек билетов */
        #results-list {
            margin-top: 20px;
        }
        .ticket-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 179, 71, 0.3);
        }
        .ticket-price {
            font-size: 20px;
            color: #ffb347;
            font-weight: bold;
        }
        .ticket-info {
            font-size: 14px;
            margin: 5px 0;
        }
        #results-screen {
            display: none;
        }
        .error-msg {
            text-align: center;
            margin: 20px 0;
            font-size: 16px;
        }
        .back-link {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container" id="search-screen">
    <h1>KUPIAVIA ✈️</h1>
    
    <div class="form-group">
        <label>ОТКУДА</label>
        <input type="text" id="from" placeholder="Город или аэропорт" autocomplete="off">
        <div id="from-results" class="autocomplete-results"></div>
    </div>

    <div class="form-group">
        <label>КУДА</label>
        <input type="text" id="to" placeholder="Город или аэропорт" autocomplete="off">
        <div id="to-results" class="autocomplete-results"></div>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label>ДАТА ВЫЛЕТА</label>
            <input type="date" id="date">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>ПАССАЖИРЫ</label>
            <select id="passengers">
                <option value="1">1 чел.</option>
                <option value="2">2 чел.</option>
                <option value="3">3 чел.</option>
            </select>
        </div>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label>КЛАСС</label>
            <select id="class">
                <option>Эконом</option>
                <option>Бизнес</option>
            </select>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>БАГАЖ</label>
            <select id="baggage">
                <option>Ручная кладь</option>
                <option>С багажом</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>КОНТАКТНЫЙ ТЕЛЕФОН</label>
        <input type="tel" id="phone" placeholder="+7 (">
    </div>

    <div class="form-group">
        <label>ВАШ TELEGRAM</label>
        <input type="text" id="telegram" placeholder="@username">
    </div>

    <button class="btn" onclick="goToResults()">ПРОДОЛЖИТЬ</button>
    <div class="footer-text">3 чел. выбирают этот рейс прямо сейчас</div>
</div>

<div class="container" id="results-screen">
    <h1>ВЫБЕРИТЕ РЕЙС ✈️</h1>
    
    <div id="loading-status" class="error-msg">Ищем лучшие билеты...</div>
    <div id="results-list"></div>
    
    <a href="#" class="back-link" onclick="goBack()">← Назад к поиску</a>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let selectedOrigin = "";
    let selectedDestination = "";
    let currentTickets = [];

    async function searchCities(query, resultsId, inputId, type) {
        if (query.length < 2) {
            document.getElementById(resultsId).style.display = 'none';
            return;
        }
        try {
            const response = await fetch(`https://autocomplete.travelpayouts.com/places2?term=${query}&locale=ru&types[]=city&types[]=airport`);
            const data = await response.json();
            const resultsContainer = document.getElementById(resultsId);
            resultsContainer.innerHTML = '';
            resultsContainer.style.display = 'block';

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                const name = item.name || item.main_airport_name;
                div.textContent = `${name} (${item.code})`;
                div.onclick = () => {
                    document.getElementById(inputId).value = `${name} (${item.code})`;
                    if (type === 'from') selectedOrigin = item.code;
                    else selectedDestination = item.code;
                    resultsContainer.style.display = 'none';
                };
                resultsContainer.appendChild(div);
            });
        } catch (e) { console.error(e); }
    }

    document.getElementById('from').oninput = (e) => searchCities(e.target.value, 'from-results', 'from', 'from');
    document.getElementById('to').oninput = (e) => searchCities(e.target.value, 'to-results', 'to', 'to');

    async function goToResults() {
        const date = document.getElementById('date').value;
        if (!selectedOrigin || !selectedDestination || !date) {
            alert("Пожалуйста, заполните все данные поиска.");
            return;
        }
        
        document.getElementById('search-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        document.getElementById('results-list').innerHTML = '';
        document.getElementById('loading-status').style.display = 'block';
        document.getElementById('loading-status').innerText = "Ищем лучшие билеты...";

        try {
            // Используем cors-anywhere прокси или прямой запрос (если API позволяет)
            // ВАЖНО: Мы запрашиваем через API Travelpayouts напрямую в приложении
            const token = "c6dd78e239fcf7c47f3f9fd58c0e2b8c";
            const url = `https://api.travelpayouts.com/aviasales/v3/prices_for_dates?origin=${selectedOrigin}&destination=${selectedDestination}&departure_at=${date}&currency=rub&token=${token}&limit=10`;
            
            const response = await fetch(url);
            const resData = await response.json();

            document.getElementById('loading-status').style.display = 'none';

            if (resData.success && resData.data.length > 0) {
                resData.data.forEach((ticket, index) => {
                    const card = document.createElement('div');
                    card.className = 'ticket-card';
                    card.innerHTML = `
                        <div class="ticket-price">${ticket.price} ₽</div>
                        <div class="ticket-info">✈️ Рейс: ${ticket.airline} ${ticket.flight_number}</div>
                        <div class="ticket-info">📅 Вылет: ${ticket.departure_at.replace('T', ' ')}</div>
                        <div class="ticket-info">🔄 Пересадок: ${ticket.transfers}</div>
                        <button class="btn" style="margin-top:10px; padding:10px; font-size:14px;" onclick="sendOrder(${index})">ОФОРМИТЬ</button>
                    `;
                    document.getElementById('results-list').appendChild(card);
                });
                currentTickets = resData.data;
            } else {
                document.getElementById('loading-status').innerText = "Билетов не найдено. Попробуйте другую дату.";
            }
        } catch (e) {
            document.getElementById('loading-status').innerText = "Ошибка загрузки. Проверьте соединение.";
            console.error(e);
        }
    }

    function goBack() {
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('search-screen').style.display = 'block';
    }

    function sendOrder(index) {
        const ticket = currentTickets[index];
        let data = {
            action: "final_order",
            from: document.getElementById('from').value,
            to: document.getElementById('to').value,
            date: document.getElementById('date').value,
            price: ticket.price,
            airline: ticket.airline,
            flight: ticket.flight_number,
            phone: document.getElementById('phone').value,
            telegram: document.getElementById('telegram').value,
            class: document.getElementById('class').value,
            baggage: document.getElementById('baggage').value
        };

        tg.sendData(JSON.stringify(data));
        tg.close();
    }

    document.onclick = (e) => {
        if (!e.target.closest('.form-group')) {
            document.querySelectorAll('.autocomplete-results').forEach(el => el.style.display = 'none');
        }
    };
</script>

</body>
</html>

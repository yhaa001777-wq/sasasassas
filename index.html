<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kupi Avia</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a3a5a;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #ffb347;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #ffb347;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-sizing: border-box;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(to right, #ffb347, #ffcc33);
            color: black;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .footer-text {
            text-align: center;
            font-size: 10px;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

<div class="container" id="search-screen">
    <h1>KUPIAVIA ✈️</h1>
    
    <div class="form-group">
        <label>ОТКУДА</label>
        <input type="text" id="from" placeholder="Минеральные Воды">
    </div>

    <div class="form-group">
        <label>КУДА</label>
        <input type="text" id="to" placeholder="Махачкала (MCX)">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label>ДАТА ВЫЛЕТА</label>
            <input type="date" id="date">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>ПАССАЖИРЫ</label>
            <select id="passengers">
                <option>1 чел.</option>
                <option>2 чел.</option>
                <option>3 чел.</option>
            </select>
        </div>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label>КЛАСС</label>
            <select id="class">
                <option>Эконом</option>
                <option>Бизнес</option>
            </select>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>БАГАЖ</label>
            <select id="baggage">
                <option>Ручная кладь</option>
                <option>С багажом</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>КОНТАКТНЫЙ ТЕЛЕФОН</label>
        <input type="tel" id="phone" placeholder="+7 (">
    </div>

    <div class="form-group">
        <label>ВАШ TELEGRAM</label>
        <input type="text" id="telegram" placeholder="@username">
    </div>

    <button class="btn" onclick="sendOrder()">ОСТАВИТЬ ЗАЯВКУ</button>
    <div class="footer-text">3 чел. выбирают этот рейс прямо сейчас</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function sendOrder() {
        let data = {
            action: "search_tickets",
            from: document.getElementById('from').value,
            to: document.getElementById('to').value,
            origin: "MRV", // Для примера кода IATA города (нужно будет доработать автоподстановку)
            destination: "MCX",
            departure_at: document.getElementById('date').value,
            date: document.getElementById('date').value,
            class: document.getElementById('class').value,
            baggage: document.getElementById('baggage').value,
            phone: document.getElementById('phone').value,
            telegram: document.getElementById('telegram').value
        };

        // Мы отправляем данные боту. Бот сам сделает запрос к API и решит проблему CORS.
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>

</body>
</html>

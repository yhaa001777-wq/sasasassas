<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avia Order</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #e0f2f1; margin: 0; padding: 15px; overflow: hidden; position: relative; }
        
        /* Анимированные облака */
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.8; z-index: 1; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        
        .c1 { width: 100px; height: 40px; top: 10%; left: -120px; animation: moveCloud 20s infinite linear; }
        .c1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .c1::after { width: 40px; height: 40px; top: -20px; right: 15px; }
        
        .c2 { width: 150px; height: 60px; top: 30%; left: -180px; animation: moveCloud 25s infinite linear 5s; opacity: 0.5; transform: scale(0.7); }
        .c2::before { width: 80px; height: 80px; top: -40px; left: 20px; }
        .c2::after { width: 60px; height: 60px; top: -30px; right: 20px; }

        .c3 { width: 120px; height: 50px; top: 60%; left: -150px; animation: moveCloud 18s infinite linear 2s; opacity: 0.6; }
        .c3::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .c3::after { width: 50px; height: 50px; top: -25px; right: 20px; }

        @keyframes moveCloud { 
            0% { left: -200px; } 
            100% { left: 100vw; } 
        }

        /* Карточка формы */
        .card { background: rgba(255, 255, 255, 0.9); border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; backdrop-filter: blur(5px); }
        h2 { color: #0085FF; text-align: center; margin-bottom: 25px; font-size: 22px; font-weight: 800; }
        
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 11px; font-weight: bold; color: #adb5bd; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; padding: 16px; border: 1px solid #f1f3f5; border-radius: 14px; font-size: 16px; box-sizing: border-box; background: #f8f9fa; outline: none; transition: 0.3s; }
        input:focus { border-color: #0085FF; background: #fff; box-shadow: 0 0 0 4px rgba(0,133,255,0.1); }
        
        /* Кнопка с самолетом */
        .btn-container { position: relative; margin-top: 15px; }
        .btn { background: #FF8E01; color: white; border: none; padding: 20px; width: 100%; border-radius: 14px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(255,142,1,0.3); position: relative; z-index: 2; overflow: hidden; }
        .btn:active { transform: scale(0.98); }
        
        .airplane-icon { position: absolute; left: -50px; top: 50%; transform: translateY(-50%); font-size: 24px; transition: 0.5s ease-out; opacity: 0; }
        .btn.loading .airplane-icon { left: 85%; opacity: 1; }
        .btn.loading .btn-text { opacity: 0.3; }

        /* Автокомплит */
        .suggestions { position: absolute; background: white; width: 100%; z-index: 100; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; margin-top: 5px; max-height: 200px; overflow-y: auto; }
        .s-item { padding: 14px; border-bottom: 1px solid #f8f9fa; cursor: pointer; font-size: 15px; color: #333; }
        .s-item:hover { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<div class="card">
    <h2>Avia Order ✈️</h2>
    
    <div class="input-group">
        <label>Пункт отправления</label>
        <input type="text" id="origin" placeholder="Напр. Москва" autocomplete="off">
        <div id="origin-list" class="suggestions"></div>
    </div>

    <div class="input-group">
        <label>Пункт прибытия</label>
        <input type="text" id="destination" placeholder="Напр. Дубай" autocomplete="off">
        <div id="dest-list" class="suggestions"></div>
    </div>

    <div style="display: flex; gap: 12px;">
        <div class="input-group" style="flex: 2;">
            <label>Дата вылета</label>
            <input type="date" id="date">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>Пассажиры</label>
            <select id="passengers">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4+">4+</option>
            </select>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn" id="submitBtn" onclick="sendOrder()">
            <span class="btn-text">Оставить заявку</span>
            <span class="airplane-icon">✈️</span>
        </button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    async function setupAutocomplete(inputId, listId) {
        const input = document.getElementById(inputId);
        const list = document.getElementById(listId);

        input.oninput = async () => {
            if (input.value.length < 2) { list.style.display = 'none'; return; }
            try {
                const res = await fetch(`https://autocomplete.travelpayouts.com/jsearch?static=1&limit=5&term=${input.value}&lang=ru`);
                const data = await res.json();
                list.innerHTML = '';
                if (data.length > 0) {
                    list.style.display = 'block';
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 's-item';
                        div.innerText = item.name;
                        div.onclick = () => { input.value = item.name; list.style.display = 'none'; };
                        list.appendChild(div);
                    });
                }
            } catch(e) {}
        };
    }

    setupAutocomplete('origin', 'origin-list');
    setupAutocomplete('destination', 'dest-list');

    function sendOrder() {
        const order = {
            from: document.getElementById('origin').value,
            to: document.getElementById('destination').value,
            date: document.getElementById('date').value,
            passengers: document.getElementById('passengers').value
        };

        if (!order.from || !order.to || !order.date) {
            tg.showAlert("Пожалуйста, заполните все поля");
            return;
        }

        // Анимация кнопки
        const btn = document.getElementById('submitBtn');
        btn.classList.add('loading');
        btn.disabled = true;

        // Отправка данных боту через 1 секунду (после анимации)
        setTimeout(() => {
            tg.sendData(JSON.stringify(order));
        }, 1000);
    }
</script>
</body>
</html>

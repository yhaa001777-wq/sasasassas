<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyBooking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Основные стили и фон */
        body {
            margin: 0; padding: 15px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #b3e5fc 0%, #e1f5fe 100%);
            overflow: hidden; /* Чтобы облака не выходили за пределы */
            position: relative;
            color: #333;
        }

        /* Анимированные облака на фоне */
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 100px;
            opacity: 0.8;
            z-index: 1;
        }
        .cloud::after, .cloud::before {
            content: ''; position: absolute; background: #fff; border-radius: 100px;
        }
        
        /* Разные типы облаков */
        .cloud-1 { width: 100px; height: 40px; top: 10%; left: -120px; animation: moveClouds 25s infinite linear; }
        .cloud-1::after { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::before { width: 40px; height: 40px; top: -20px; right: 15px; }

        .cloud-2 { width: 150px; height: 60px; top: 40%; left: -180px; animation: moveClouds 35s infinite linear 5s; opacity: 0.5; }
        .cloud-2::after { width: 80px; height: 80px; top: -40px; left: 20px; }
        .cloud-2::before { width: 60px; height: 60px; top: -30px; right: 20px; }

        @keyframes moveClouds {
            0% { left: -200px; }
            100% { left: 100vw; }
        }

        /* Карточка формы */
        .booking-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(5px); /* Легкое размытие фона */
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            color: #0085FF;
            font-size: 20px;
            font-weight: bold;
        }

        /* Стили полей ввода */
        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block; font-size: 11px; font-weight: bold;
            color: #adb5bd; margin-bottom: 6px; text-transform: uppercase;
        }
        .input-group input, .input-group select {
            width: 100%; padding: 14px;
            border: 1px solid #f1f3f5; border-radius: 14px;
            font-size: 16px; box-sizing: border-box;
            background: #f8f9fa; outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #0085FF;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 133, 255, 0.1);
        }

        /* Анимированная кнопка отправки */
        .submit-btn {
            background: linear-gradient(90deg, #FF8E01 0%, #FFAC33 100%);
            color: white; border: none;
            padding: 18px; width: 100%;
            border-radius: 14px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
            position: relative; overflow: hidden;
            box-shadow: 0 5px 15px rgba(255, 142, 1, 0.3);
        }
        .submit-btn:active { transform: scale(0.98); }
        
        /* Эффект самолета при клике */
        .submit-btn .plane {
            position: absolute; top: 50%; left: -50px;
            transform: translateY(-50%) rotate(0deg);
            font-size: 20px; opacity: 0;
            transition: 0.5s ease-in-out;
        }
        .submit-btn.loading .plane {
            left: 90%; opacity: 1; transform: translateY(-50%) rotate(-45deg);
        }
        .submit-btn.loading span:not(.plane) { opacity: 0.2; }

    </style>
</head>
<body>

    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>

    <div class="booking-card">
        <div class="header">SkyBooking ✈️</div>
        
        <div class="input-group">
            <label>Откуда (напр. Москва)</label>
            <input type="text" id="origin" placeholder="Город отправления" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Куда (напр. Дубай)</label>
            <input type="text" id="destination" placeholder="Город прибытия" autocomplete="off">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 2;">
                <label>Дата</label>
                <input type="date" id="date">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Пассажиров</label>
                <select id="passengers">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4+">4+</option>
                </select>
            </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="sendOrder()">
            <span>Оставить заявку</span>
            <span class="plane">✈️</span>
        </button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // Расширяем на весь экран

    // Устанавливаем сегодняшнюю дату по умолчанию
    document.getElementById('date').valueAsDate = new Date();

    function sendOrder() {
        const order = {
            from: document.getElementById('origin').value,
            to: document.getElementById('destination').value,
            date: document.getElementById('date').value,
            passengers: document.getElementById('passengers').value
        };

        if (!order.from || !order.to || !order.date) {
            tg.showAlert("Пожалуйста, заполните все поля");
            return;
        }

        // Включаем анимацию самолета на кнопке
        const btn = document.getElementById('submitBtn');
        btn.classList.add('loading');
        btn.disabled = true;

        // Отправляем данные боту и закрываем приложение через секунду
        setTimeout(() => {
            tg.sendData(JSON.stringify(order));
        }, 1200);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyBooking Global</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass: rgba(30, 33, 37, 0.98);
            --blue: #00e5ff; /* Неоновый бирюзовый */
            --accent: #ffffff; /* Белый/серебро */
            --bg-top: #121417; /* Глубокий темный */
            --bg-bottom: #1c1f24;
            --text-main: #e0e0e0;
            --text-label: #90a4ae;
        }

        body {
            margin: 0; padding: 10px;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
            color: var(--text-main);
        }

        /* Анимации неба */
        .sun { position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; background: radial-gradient(circle, #455a64, #263238); border-radius: 50%; box-shadow: 0 0 40px rgba(0, 229, 255, 0.2); z-index: 1; opacity: 0.6; }
        .sky-plane { position: absolute; font-size: 22px; z-index: 3; animation: fly 15s linear infinite; opacity: 0; filter: drop-shadow(0 0 5px var(--blue)); }
        @keyframes fly { 0% { left: -50px; opacity: 0; } 10% { opacity: 0.7; } 90% { opacity: 0.7; } 100% { left: 110vw; opacity: 0; } }

        /* Карточка */
        .card {
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 32px; padding: 25px; width: 100%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 10;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h2 { text-align: center; color: var(--blue); margin: 0 0 20px 0; font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }

        .grid-row { display: grid; grid-template-columns: 100px 1fr; align-items: center; margin-bottom: 12px; gap: 10px; position: relative; }
        .label { font-size: 11px; font-weight: 700; color: var(--text-label); text-transform: uppercase; letter-spacing: 0.5px; }

        input, select { 
            width: 100%; padding: 12px; border: 1.5px solid rgba(255, 255, 255, 0.05); 
            border-radius: 14px; font-size: 15px; outline: none; box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.03); transition: 0.3s;
            color: white;
            caret-color: var(--blue); /* Делаем курсор видимым */
        }
        input:focus { border-color: var(--blue); background: rgba(255, 255, 255, 0.07); }
        select option { background: #1c1f24; color: white; }

        /* Выпадающий список API */
        .autocomplete-suggestions {
            position: absolute; top: 100%; left: 110px; right: 0;
            background: #25292e; border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 200px; overflow-y: auto; z-index: 100; display: none; margin-top: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .suggestion { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; line-height: 1.2; transition: 0.2s; color: white; }
        .suggestion:hover { background: rgba(0, 229, 255, 0.1); color: var(--blue); }
        .suggestion div { color: var(--text-label); font-size: 11px; margin-top: 2px; }

        .btn-box { position: relative; margin-top: 20px; border-radius: 16px; overflow: hidden; box-shadow: 0 5px 20px rgba(0, 229, 255, 0.2); }
        .btn { background: linear-gradient(90deg, #0097a7, #00e5ff); color: #000; border: none; padding: 18px; width: 100%; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); filter: brightness(1.2); }
        
        .plane-anim { position: absolute; left: -60px; top: 50%; transform: translateY(-50%); font-size: 24px; transition: 1s ease-in; }
        .loading .plane-anim { left: 110%; }
        .loading span { opacity: 0; }

        /* Кастомизация календаря для темной темы */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="sky-plane">✈️</div>

    <div class="card">
        <h2>SkyBooking ✈️</h2>
        
        <div class="grid-row">
            <div class="label">Откуда</div>
            <div>
                <input type="text" id="origin" placeholder="Город или аэропорт" autocomplete="off">
                <div id="origin-suggestions" class="autocomplete-suggestions"></div>
            </div>
        </div>

        <div class="grid-row">
            <div class="label">Куда</div>
            <div>
                <input type="text" id="destination" placeholder="Город или аэропорт" autocomplete="off">
                <div id="destination-suggestions" class="autocomplete-suggestions"></div>
            </div>
        </div>

        <div class="grid-row">
            <div class="label">Дата</div>
            <input type="date" id="date">
        </div>

        <div class="grid-row">
            <div class="label">Пассажиры</div>
            <select id="passengers">
                <option value="1">1 пассажир</option>
                <option value="2">2 пассажира</option>
                <option value="3">3 пассажира</option>
                <option value="4+">4+ пассажира</option>
            </select>
        </div>

        <div class="grid-row">
            <div class="label">Класс</div>
            <select id="class">
                <option value="Эконом">Эконом</option>
                <option value="Стандарт">Стандарт</option>
                <option value="Бизнес">Бизнес</option>
            </select>
        </div>

        <div class="grid-row">
            <div class="label">Багаж</div>
            <select id="baggage">
                <option value="Только ручная кладь">Только ручная кладь</option>
                <option value="1 место до 23кг">1 место до 23кг</option>
                <option value="2 места по 23кг">2 места по 23кг</option>
                <option value="Нужен расчет">Нужен расчет</option>
            </select>
        </div>

        <div class="grid-row">
            <div class="label">Телефон</div>
            <input type="tel" id="phone" value="+7" maxlength="12">
        </div>

        <div class="grid-row">
            <div class="label">Telegram</div>
            <input type="text" id="telegram" placeholder="@username">
        </div>

        <div class="btn-box" id="btnBox">
            <button class="btn" onclick="sendOrder()">
                <span>Оставить заявку</span>
                <span class="plane-anim">✈️</span>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.username) {
            document.getElementById('telegram').value = '@' + tg.initDataUnsafe.user.username;
        }

        // Логика для телефона
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function(e) {
            if (!this.value.startsWith('+7')) {
                this.value = '+7';
            }
            this.value = this.value.replace(/[^\d+]/g, ''); // Только цифры и плюс
        });

        phoneInput.addEventListener('click', function() {
            if (this.value === '+7') {
                this.setSelectionRange(2, 2);
            }
        });

        async function searchPlaces(query) {
            if (query.length < 2) return [];
            try {
                const response = await fetch(`https://autocomplete.travelpayouts.com/places2?term=${query}&locale=ru&types[]=city&types[]=airport`);
                return await response.json();
            } catch (e) {
                console.error("Ошибка API:", e);
                return [];
            }
        }

        function setupAutocomplete(inputId, suggestionsId) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(suggestionsId);
            let timeout;

            input.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(async () => {
                    const query = input.value.trim();
                    const results = await searchPlaces(query);
                    
                    list.innerHTML = '';
                    if (results.length > 0) {
                        results.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'suggestion';
                            const typeLabel = item.type === 'airport' ? '✈️ ' : '';
                            div.innerHTML = `${typeLabel}${item.name} (${item.code}) <div>${item.country_name}</div>`;
                            
                            div.onclick = () => {
                                input.value = item.name + ' (' + item.code + ')';
                                list.style.display = 'none';
                            };
                            list.appendChild(div);
                        });
                        list.style.display = 'block';
                    } else {
                        list.style.display = 'none';
                    }
                }, 300);
            });

            document.addEventListener('click', (e) => {
                if (e.target !== input) list.style.display = 'none';
            });
        }

        setupAutocomplete('origin', 'origin-suggestions');
        setupAutocomplete('destination', 'destination-suggestions');

        document.getElementById('date').valueAsDate = new Date();

        function sendOrder() {
            const data = {
                from: document.getElementById('origin').value,
                to: document.getElementById('destination').value,
                date: document.getElementById('date').value,
                passengers: document.getElementById('passengers').value,
                class: document.getElementById('class').value,
                baggage: document.getElementById('baggage').value,
                phone: document.getElementById('phone').value,
                telegram: document.getElementById('telegram').value
            };

            if (!data.from || !data.to || data.phone.length < 12) { 
                tg.showAlert("Заполните все поля корректно (номер должен быть полным)!"); 
                return; 
            }

            document.getElementById('btnBox').classList.add('loading');
            setTimeout(() => { tg.sendData(JSON.stringify(data)); }, 1200);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyBooking Global</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.9);
            --blue: #0277BD;
            --accent: #FF8E01;
        }

        body {
            margin: 0; padding: 10px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
        }

        /* Анимации неба */
        .sun { position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; background: radial-gradient(circle, #FFF9C4, #FBC02D); border-radius: 50%; box-shadow: 0 0 30px #FBC02D; z-index: 1; }
        .sky-plane { position: absolute; font-size: 22px; z-index: 3; animation: fly 15s linear infinite; opacity: 0; }
        @keyframes fly { 0% { left: -50px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 110vw; opacity: 0; } }

        /* Карточка */
        .card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 28px; padding: 25px; width: 100%; max-width: 380px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 10;
        }

        .grid-row { display: grid; grid-template-columns: 100px 1fr; align-items: center; margin-bottom: 12px; gap: 10px; position: relative; }
        .label { font-size: 13px; font-weight: 700; color: #546E7A; }

        input, select { width: 100%; padding: 12px; border: 1px solid rgba(0,0,0,0.1); border-radius: 14px; font-size: 15px; outline: none; box-sizing: border-box; }

        /* Выпадающий список API */
        .autocomplete-suggestions {
            position: absolute; top: 100%; left: 110px; right: 0;
            background: white; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-height: 200px; overflow-y: auto; z-index: 100; display: none; margin-top: 2px;
        }
        .suggestion { padding: 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 14px; line-height: 1.2; }
        .suggestion:hover { background: #e3f2fd; }
        .suggestion div { color: #999; font-size: 11px; margin-top: 2px; }

        .btn-box { position: relative; margin-top: 20px; border-radius: 15px; overflow: hidden; }
        .btn { background: linear-gradient(90deg, #FF8E01, #FF6B00); color: white; border: none; padding: 18px; width: 100%; font-size: 16px; font-weight: 800; cursor: pointer; }
        .plane-anim { position: absolute; left: -60px; top: 50%; transform: translateY(-50%); font-size: 24px; transition: 1s ease-in; }
        .loading .plane-anim { left: 110%; }
        .loading span { opacity: 0; }
    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="sky-plane">✈️</div>

    <div class="card">
        <h2 style="text-align:center; color: #0277BD; margin-top:0;">SkyBooking ✈️</h2>
        
        <div class="grid-row">
            <div class="label">Откуда</div>
            <div>
                <input type="text" id="origin" placeholder="Город или аэропорт" autocomplete="off">
                <div id="origin-suggestions" class="autocomplete-suggestions"></div>
            </div>
        </div>

        <div class="grid-row">
            <div class="label">Куда</div>
            <div>
                <input type="text" id="destination" placeholder="Город или аэропорт" autocomplete="off">
                <div id="destination-suggestions" class="autocomplete-suggestions"></div>
            </div>
        </div>

        <div class="grid-row">
            <div class="label">Дата</div>
            <input type="date" id="date">
        </div>

        <div class="grid-row">
            <div class="label">Пассажиры</div>
            <select id="passengers">
                <option value="1">1 пассажир</option>
                <option value="2">2 пассажира</option>
                <option value="3">3 пассажира</option>
                <option value="4+">4+ пассажира</option>
            </select>
        </div>

        <div class="grid-row">
            <div class="label">Класс</div>
            <select id="class">
                <option value="Эконом">Эконом</option>
                <option value="Стандарт">Стандарт</option>
                <option value="Бизнес">Бизнес</option>
            </select>
        </div>

        <div class="grid-row">
            <div class="label">Телефон</div>
            <input type="tel" id="phone" value="+7">
        </div>

        <div class="grid-row">
            <div class="label">Telegram</div>
            <input type="text" id="telegram" placeholder="@username">
        </div>

        <div class="btn-box" id="btnBox">
            <button class="btn" onclick="sendOrder()">
                <span>Оставить заявку</span>
                <span class="plane-anim">✈️</span>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Автозаполнение ника если он есть в ТГ
        if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.username) {
            document.getElementById('telegram').value = '@' + tg.initDataUnsafe.user.username;
        }

        // Функция поиска через API Travelpayouts (города и аэропорты)
        async function searchPlaces(query) {
            if (query.length < 2) return [];
            try {
                // Запрашиваем и города (city), и аэропорты (airport)
                const response = await fetch(`https://autocomplete.travelpayouts.com/places2?term=${query}&locale=ru&types[]=city&types[]=airport`);
                return await response.json();
            } catch (e) {
                console.error("Ошибка API:", e);
                return [];
            }
        }

        function setupAutocomplete(inputId, suggestionsId) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(suggestionsId);
            let timeout;

            input.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(async () => {
                    const query = input.value.trim();
                    const results = await searchPlaces(query);
                    
                    list.innerHTML = '';
                    if (results.length > 0) {
                        results.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'suggestion';
                            // Показываем название и код (например, DME)
                            const typeLabel = item.type === 'airport' ? '✈️ Аэропорт ' : '';
                            div.innerHTML = `${typeLabel}${item.name} (${item.code}) <div>${item.country_name}</div>`;
                            
                            div.onclick = () => {
                                input.value = item.name + ' (' + item.code + ')';
                                list.style.display = 'none';
                            };
                            list.appendChild(div);
                        });
                        list.style.display = 'block';
                    } else {
                        list.style.display = 'none';
                    }
                }, 300);
            });

            document.addEventListener('click', (e) => {
                if (e.target !== input) list.style.display = 'none';
            });
        }

        setupAutocomplete('origin', 'origin-suggestions');
        setupAutocomplete('destination', 'destination-suggestions');

        document.getElementById('date').valueAsDate = new Date();

        function sendOrder() {
            const data = {
                from: document.getElementById('origin').value,
                to: document.getElementById('destination').value,
                date: document.getElementById('date').value,
                passengers: document.getElementById('passengers').value,
                class: document.getElementById('class').value,
                phone: document.getElementById('phone').value,
                telegram: document.getElementById('telegram').value
            };

            if (!data.from || !data.to || data.phone.length < 5) { 
                tg.showAlert("Заполните все поля корректно!"); 
                return; 
            }

            document.getElementById('btnBox').classList.add('loading');
            setTimeout(() => { tg.sendData(JSON.stringify(data)); }, 1200);
        }
    </script>
</body>
</html>

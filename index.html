<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyBooking Luxury</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-text: #ffffff;
            --accent: #ffb347; /* Песочное золото */
            --gold-grad: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --bg-night: linear-gradient(180deg, #2c3e50 0%, #000000 100%);
        }

        body {
            margin: 0; padding: 15px;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-night);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            /* Изменено для включения прокрутки */
            overflow-y: auto;
            color: white;
            transition: background 5s ease-in-out;
            animation: skyCycle 25s infinite linear;
        }

        @keyframes skyCycle {
            0%, 100% { background: #000000; }
            40%, 60% { background: #1a5276; }
        }

        /* Северное сияние */
        .aurora {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(0, 255, 150, 0.15), transparent 70%),
                        radial-gradient(circle at 20% -10%, rgba(150, 0, 255, 0.1), transparent 60%);
            filter: blur(60px); opacity: 0; z-index: 0; pointer-events: none;
            animation: auroraFade 25s infinite linear;
        }
        @keyframes auroraFade {
            0%, 20%, 80%, 100% { opacity: 0; }
            45%, 55% { opacity: 1; }
        }

        .orbit {
            position: fixed; top: 50%; left: 50%;
            width: 120vw; height: 120vw;
            margin-left: -60vw; margin-top: -30vw;
            border-radius: 50%;
            z-index: 0;
            animation: rotateOrbit 25s infinite linear;
            pointer-events: none;
            filter: blur(35px);
            opacity: 0.8;
        }
        .sun { position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-size: 80px; filter: drop-shadow(0 0 40px orange); }
        .moon { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); font-size: 70px; filter: drop-shadow(0 0 30px white); }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .star {
            position: fixed; top: -10vh; width: 2px; height: 2px;
            background: white; border-radius: 50%;
            box-shadow: 0 0 10px white; z-index: 1;
            animation: shoot 4s linear infinite, starFade 25s infinite linear;
        }
        .star::after {
            content: ''; position: absolute; top: 0; left: 50%;
            width: 1px; height: 80px;
            background: linear-gradient(180deg, white, transparent);
            transform: translateX(-50%);
        }
        @keyframes shoot {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) translateX(50px); opacity: 0; }
        }
        @keyframes starFade {
            0%, 20%, 80%, 100% { opacity: 1; }
            40%, 60% { opacity: 0; }
        }

        .glow {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; height: 300px;
            background: radial-gradient(circle, rgba(253, 160, 133, 0.3) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        .sky-plane { position: absolute; font-size: 22px; z-index: 3; animation: fly 15s linear infinite; opacity: 0.5; filter: drop-shadow(0 0 10px var(--accent)); }
        @keyframes fly { 0% { left: -50px; opacity: 0; } 10% { opacity: 0.4; } 90% { opacity: 0.4; } 100% { left: 110vw; opacity: 0; } }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px; padding: 25px; width: 100%; max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-sizing: border-box;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 20px 0; /* Добавлен отступ для комфортной прокрутки */
        }

        /* Анимация закрытия */
        .closing-app .card { transform: scale(0.1) translateY(-500px); opacity: 0; }
        .closing-app { background: black !important; }

        h2 { 
            text-align: center; 
            background: var(--gold-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 25px 0; font-size: 26px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; 
        }

        .input-group { margin-bottom: 18px; position: relative; }
        .row { display: flex; gap: 10px; margin-bottom: 18px; }
        .row > div { flex: 1; }
        .label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; padding-left: 5px; opacity: 0.9; }

        input, select { 
            width: 100%; padding: 14px; border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; font-size: 15px; outline: none; box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.08); color: white; transition: all 0.3s ease;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.4); }
        input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
        option { background: #2c3e50; color: white; }

        .autocomplete-suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: rgba(44, 62, 80, 0.95); border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            max-height: 180px; overflow-y: auto; z-index: 100; margin-top: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0; pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .autocomplete-suggestions.active {
            opacity: 1; pointer-events: auto; transform: translateY(0);
        }

        .suggestion { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; transition: background 0.2s; }
        .suggestion:hover { background: rgba(255, 179, 71, 0.2); }
        .suggestion div { color: #aaa; font-size: 11px; }

        .btn-box { position: relative; margin-top: 20px; border-radius: 18px; overflow: hidden; }
        .btn { 
            background: var(--gold-grad); 
            color: #000; border: none; padding: 18px; width: 100%; 
            font-size: 17px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(253, 160, 133, 0.3);
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .plane-anim { position: absolute; left: -60px; top: 50%; transform: translateY(-50%); font-size: 24px; transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .loading .plane-anim { left: 110%; }
        .loading span { opacity: 0; }

        .live-hint {
            text-align: center; font-size: 11px; color: rgba(255,255,255,0.5);
            margin-top: 15px; min-height: 14px; font-style: italic;
        }
    </style>
</head>
<body>

    <div class="aurora"></div>
    <div class="orbit">
        <div class="sun">☀️</div>
        <div class="moon">🌙</div>
    </div>

    <div class="glow"></div>
    <div class="sky-plane">✈️</div>
    <div id="stars-container"></div>

    <div class="card">
        <h2>KupiAvia ✈️</h2>
        
        <div class="row">
            <div class="input-group">
                <div class="label">Откуда</div>
                <input type="text" id="origin" placeholder="🏙️ Город" autocomplete="off">
                <div id="origin-suggestions" class="autocomplete-suggestions"></div>
            </div>
            <div class="input-group">
                <div class="label">Куда</div>
                <input type="text" id="destination" placeholder="🏙️ Город" autocomplete="off">
                <div id="destination-suggestions" class="autocomplete-suggestions"></div>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <div class="label">Дата вылета</div>
                <input type="date" id="date">
            </div>
            <div class="input-group">
                <div class="label">Пассажиры</div>
                <select id="passengers">
                    <option value="1"> 1 чел.</option>
                    <option value="2"> 2 чел.</option>
                    <option value="3"> 3 чел.</option>
                    <option value="4+"> 4+ чел.</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <div class="label">Класс</div>
                <select id="class">
                    <option value="Эконом"> Эконом</option>
                    <option value="Стандарт"> Комфорт</option>
                    <option value="Бизнес"> Бизнес</option>
                </select>
            </div>
            <div class="input-group">
                <div class="label">Багаж</div>
                <select id="baggage">
                    <option value="Только ручная кладь"> Ручная кладь</option>
                    <option value="1 место до 23кг"> Багаж (23кг)</option>
                    <option value="Нужен расчет"> Нужен расчет</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <div class="label">Контактный телефон</div>
            <input type="tel" id="phone" value="+7 (" maxlength="18" placeholder="+7 (___) ___-__-__">
        </div>

        <div class="input-group">
            <div class="label">Ваш Telegram</div>
            <input type="text" id="telegram" placeholder="@username">
        </div>

        <div class="btn-box" id="btnBox">
            <button class="btn" onclick="sendOrder()">
                <span>Посмотреть билеты</span>
                <span class="plane-anim">✈️</span>
            </button>
        </div>
        <div class="live-hint" id="liveHint"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let iata_origin = "";
        let iata_destination = "";

        const hints = [
            "Сейчас этот рейс смотрят {n} человека",
            "Осталось 3 билета по этой цене",
            "Последнее бронирование в этом направлении было 4 мин. назад",
            "Популярное направление сегодня",
            "{n} чел. выбирают этот рейс прямо сейчас"
        ];

        function updateHint() {
            const hintEl = document.getElementById('liveHint');
            const randomHint = hints[Math.floor(Math.random() * hints.length)];
            const n = Math.floor(Math.random() * 4) + 2; 
            hintEl.innerText = randomHint.replace('{n}', n);
        }
        setInterval(updateHint, 6000);
        updateHint();

        function createStars() {
            const container = document.getElementById('stars-container');
            for (let i = 0; i < 6; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDelay = Math.random() * 5 + 's, 0s';
                container.appendChild(star);
            }
        }
        createStars();

        tg.setHeaderColor('#2c3e50');

        if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.username) {
            document.getElementById('telegram').value = '@' + tg.initDataUnsafe.user.username;
        }

        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function(e) {
            let x = this.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
            if (!x[2] && this.value.length < 4) {
                this.value = '+7 (';
            } else {
                this.value = !x[3] ? '+7 (' + x[2] : '+7 (' + x[2] + ') ' + x[3] + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
            }
        });

        async function searchPlaces(query) {
            if (query.length < 2) return [];
            try {
                const response = await fetch(`https://autocomplete.travelpayouts.com/places2?term=${query}&locale=ru&types[]=city&types[]=airport`);
                return await response.json();
            } catch (e) { return []; }
        }

        function setupAutocomplete(inputId, suggestionsId, type) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(suggestionsId);
            let timeout;
            input.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(async () => {
                    const query = input.value.trim();
                    const results = await searchPlaces(query);
                    list.innerHTML = '';
                    if (results.length > 0) {
                        results.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'suggestion';
                            const typeLabel = item.type === 'airport' ? '✈️ ' : '🏙️ ';
                            div.innerHTML = `${typeLabel}${item.name} (${item.code}) <div>${item.country_name}</div>`;
                            div.onclick = () => {
                                input.value = item.name + ' (' + item.code + ')';
                                if(type === 'origin') iata_origin = item.code;
                                if(type === 'dest') iata_destination = item.code;
                                list.classList.remove('active');
                            };
                            list.appendChild(div);
                        });
                        list.classList.add('active');
                    } else { list.classList.remove('active'); }
                }, 300);
            });
            document.addEventListener('click', (e) => { if (e.target !== input) list.classList.remove('active'); });
        }

        setupAutocomplete('origin', 'origin-suggestions', 'origin');
        setupAutocomplete('destination', 'destination-suggestions', 'dest');
        document.getElementById('date').valueAsDate = new Date();

        function sendOrder() {
            const data = {
                action: "search_tickets",
                origin_code: iata_origin,
                destination_code: iata_destination,
                from: document.getElementById('origin').value,
                to: document.getElementById('destination').value,
                date: document.getElementById('date').value,
                passengers: document.getElementById('passengers').value,
                class: document.getElementById('class').value,
                baggage: document.getElementById('baggage').value,
                phone: document.getElementById('phone').value,
                telegram: document.getElementById('telegram').value,
                direct: false,  // ДОБАВЛЕНО: искать с пересадками
                one_way: false  // ДОБАВЛЕНО: искать все типы билетов
            };
            if (!data.from || !data.to || data.phone.length < 18) { 
                tg.showAlert("Пожалуйста, заполните маршрут и телефон полностью!"); 
                return; 
            }
            
            document.getElementById('btnBox').classList.add('loading');
            
            setTimeout(() => { 
                document.body.classList.add('closing-app');
                setTimeout(() => {
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                }, 800);
            }, 1200);
        }
    </script>
</body>
</html>

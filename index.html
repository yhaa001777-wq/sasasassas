<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyBooking Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.8);
            --text: #2c3e50;
            --accent: #FF8E01;
        }

        body {
            margin: 0; padding: 10px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Эффект живого неба */
        .sun {
            position: absolute; top: 30px; right: 30px;
            width: 80px; height: 80px;
            background: radial-gradient(circle, #FFF9C4, #FBC02D);
            border-radius: 50%; box-shadow: 0 0 50px #FBC02D;
            animation: pulse 4s infinite alternate; z-index: 1;
        }

        .cloud {
            position: absolute; background: white; border-radius: 50px;
            opacity: 0.7; z-index: 2; animation: move linear infinite;
        }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: white; border-radius: 50%; }
        
        .c1 { width: 100px; height: 40px; top: 15%; animation-duration: 20s; }
        .c2 { width: 140px; height: 50px; top: 40%; animation-duration: 35s; opacity: 0.4; }
        .c3 { width: 80px; height: 30px; top: 70%; animation-duration: 25s; }

        @keyframes move { from { left: -150px; } to { left: 100vw; } }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }

        /* Карточка приложения */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 25px; padding: 25px;
            width: 100%; max-width: 380px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 10; border: 1px solid rgba(255,255,255,0.4);
        }

        h2 { text-align: center; color: #0277BD; margin-top: 0; font-size: 22px; }

        /* Сетка: Колонки */
        .row {
            display: grid;
            grid-template-columns: 1fr 1.5fr; /* Текст слева, поле справа */
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .label {
            font-size: 14px; font-weight: 600; color: var(--text);
        }

        input, select {
            width: 100%; padding: 10px;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 12px; background: white;
            font-size: 14px; outline: none; transition: 0.3s;
        }

        input:focus, select:focus { border-color: #0277BD; box-shadow: 0 0 10px rgba(2,119,189,0.1); }

        .btn-box { position: relative; margin-top: 20px; overflow: hidden; border-radius: 15px; }
        .btn {
            background: linear-gradient(90deg, #FF8E01, #FFA726);
            color: white; border: none; padding: 15px;
            width: 100%; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        .btn:active { transform: scale(0.97); }

        .plane-anim {
            position: absolute; left: -50px; top: 50%;
            transform: translateY(-50%); font-size: 20px;
            transition: 0.8s ease-in; opacity: 0;
        }

        .loading .plane-anim { left: 105%; opacity: 1; }
        .loading span { opacity: 0; }
    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <div class="card">
        <h2>SkyBooking ✈️</h2>
        
        <div class="row">
            <div class="label">Откуда</div>
            <input type="text" id="origin" placeholder="Город вылета">
        </div>

        <div class="row">
            <div class="label">Куда</div>
            <input type="text" id="destination" placeholder="Город прилета">
        </div>

        <div class="row">
            <div class="label">Дата</div>
            <input type="date" id="date">
        </div>

        <div class="row">
            <div class="label">Пассажиры</div>
            <select id="passengers">
                <option value="1">1 человек</option>
                <option value="2">2 человека</option>
                <option value="3">3 человека</option>
                <option value="4+">4+ человека</option>
            </select>
        </div>

        <div class="row">
            <div class="label">Класс</div>
            <select id="class">
                <option value="Эконом">Эконом</option>
                <option value="Стандарт">Стандарт</option>
                <option value="Бизнес">Бизнес</option>
            </select>
        </div>

        <div class="row">
            <div class="label">Багаж</div>
            <select id="baggage">
                <option value="Нужен">Нужен</option>
                <option value="Не нужен">Не нужен</option>
            </select>
        </div>

        <div class="btn-box" id="btnBox">
            <button class="btn" onclick="sendOrder()">
                <span>Оставить заявку</span>
                <span class="plane-anim">✈️</span>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('date').valueAsDate = new Date();

        function sendOrder() {
            const data = {
                from: document.getElementById('origin').value,
                to: document.getElementById('destination').value,
                date: document.getElementById('date').value,
                passengers: document.getElementById('passengers').value,
                class: document.getElementById('class').value,
                baggage: document.getElementById('baggage').value
            };

            if (!data.from || !data.to) {
                tg.showAlert("Заполните города!");
                return;
            }

            document.getElementById('btnBox').classList.add('loading');
            
            setTimeout(() => {
                tg.sendData(JSON.stringify(data));
            }, 1000);
        }
    </script>
</body>
</html>
